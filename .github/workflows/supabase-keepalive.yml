name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Websites Keepalive API
        run: |
          curl --silent --show-error --fail \
            --max-time 20 \
            --retry 2 \
            --retry-delay 3 \
            --retry-connrefused \
            "https://pixoloproductions.com/robots.txt"
